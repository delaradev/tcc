project:
  name: CPIC_Brazil
  version: 2.0.0
  seed: 42

data:
  raw_path: data/raw
  dataset_path: data/dataset
  balanced_path: data/dataset
  tiles_path: data/tiles
  tile_size: 256
  overlap: 16
  min_fg_ratio: 0.003
  desired_pos_ratio: 0.7
  max_train_samples: 20000

model:
  img_size: 256
  unet_base_filters: 16
  input_channels: 3
  output_channels: 1

training:
  batch_size: 16
  epochs: 50
  learning_rate: 0.001
  optimizer: adam
  early_stopping_patience: 4
  reduce_lr_patience: 3
  loss:
    name: tversky
    alpha: 0.7
    beta: 0.3

gpu:
  memory_growth: true
  mixed_precision: true
  memory_limit_mb: 3072

logging:
  log_dir: logs
  checkpoint_dir: checkpoints
  tensorboard_dir: tensorboard
  save_freq: 5
