# Project Configuration
project:
  name: "CPIC_Brazil"
  version: "1.0"
  seed: 42

# Data Configuration
data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  tiles_path: "data/tiles"
  dataset_path: "data/dataset_balanced"
  tile_size: 512
  overlap: 32
  val_split: 0.1
  min_fg_ratio: 0.003
  desired_pos_ratio: 0.7

# Model Configuration
model:
  img_size: 512
  unet_base_filters: 16
  input_channels: 3
  output_channels: 1

# Training Configuration
training:
  batch_size: 1
  epochs: 50
  learning_rate: 0.0001
  optimizer: "rmsprop"
  loss:
    name: "tversky"
    alpha: 0.7
    beta: 0.3
  early_stopping_patience: 15
  reduce_lr_patience: 5
  randommix: true
  randommix_prob: 1.0

# GPU Configuration
gpu:
  memory_growth: true
  mixed_precision: true
  memory_limit_mb: 3072

# Logging Configuration
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  tensorboard_dir: "tensorboard"
  save_freq: 5
