project:
  name: CPIC_Brazil
  version: 2.0.0
  seed: 42

data:
  raw_path: data/raw
  dataset_path: data/dataset
  balanced_path: data/dataset_balanced
  tiles_path: data/tiles
  tile_size: 512
  overlap: 32
  min_fg_ratio: 0.003
  desired_pos_ratio: 0.7

model:
  img_size: 512
  unet_base_filters: 16
  input_channels: 3
  output_channels: 1

training:
  batch_size: 1
  epochs: 100
  learning_rate: 0.0001
  optimizer: rmsprop
  early_stopping_patience: 15
  reduce_lr_patience: 5
  loss:
    name: tversky
    alpha: 0.7
    beta: 0.3

gpu:
  memory_growth: true
  mixed_precision: true
  memory_limit_mb: 3072

logging:
  log_dir: logs
  checkpoint_dir: checkpoints
  tensorboard_dir: tensorboard
  save_freq: 5
